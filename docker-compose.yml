version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mathflow
      POSTGRES_USER: mathflow
      POSTGRES_PASSWORD: mathflow_dev_password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./mathflow/server/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mathflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./mathflow
      dockerfile: Dockerfile.server
    environment:
      DATABASE_URL: postgresql://mathflow:mathflow_dev_password@db:5432/mathflow
      JWT_SECRET: change-this-to-a-random-32-char-string
      PORT: 3001
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./mathflow
      dockerfile: Dockerfile.frontend
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  pgdata:
