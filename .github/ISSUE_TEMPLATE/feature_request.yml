name: Feature Request
description: Suggest a new feature for MathFlow
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What's your use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Editor / Snippets
        - Math rendering (KaTeX)
        - TikZ graphics
        - AI assistance
        - SymPy computation
        - Export (LaTeX / PDF)
        - Backend / API
        - UI / Themes
        - Other
    validations:
      required: true
